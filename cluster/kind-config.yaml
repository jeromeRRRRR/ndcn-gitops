kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  [cite_start]disableDefaultCNI: true # On laisse la place à Cilium 
nodes:
- role: control-plane
- role: worker
  extraMounts:
  - [cite_start]hostPath: /mnt/c/Users/jerom/Documents # Chemin Windows vu par WSL 
    [cite_start]containerPath: /var/data-shared        # Chemin à l'intérieur du nœud 
- role: worker
  extraMounts:
  - hostPath: /mnt/c/Users/jerom/Documents
    containerPath: /var/data-shared
