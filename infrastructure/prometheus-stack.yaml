---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
  annotations:
    # On garde les annotations pour doubler la sécurité sur le remplacement
    argocd.argoproj.io/sync-options: Replace=true,ServerSideApply=true
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 61.3.1
    helm:
      values: |
        grafana:
          adminPassword: "admin"
          service:
            type: ClusterIP
        prometheus:
          prometheusSpec:
            storageSpec:
              disableMountSubPath: true # Crucial pour KIND sur Windows/WSL
            resources:
              requests:
                cpu: "100m"
                memory: "400Mi"
              limits:
                memory: "800Mi" # On limite pour éviter que le L470 ne freeze
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true    # <-- C'est ici que l'option doit être déclarée
      - Replace=true           # Force le remplacement des objets RBAC conflictuels
      - ServerSideApply=true   # Gère mieux les gros manifestes (CRDs)
    