---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    chart: kube-prometheus-stack
    repoURL: https://prometheus-community.github.io/helm-charts
    targetRevision: 61.3.1 # Version stable
    helm:
      values: |
        grafana:
          adminPassword: "admin" # À changer plus tard !
          service:
            type: ClusterIP
        prometheus:
          prometheusSpec:
            storageSpec:
              disableMountSubPath: true # Nécessaire pour KIND
            # On réduit les ressources pour le laptop
            resources:
              requests:
                memory: "400Mi"
  destination:
    server: "https://kubernetes.default.svc"
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true # ArgoCD créera le namespace 'monitoring'
