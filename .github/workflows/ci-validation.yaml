name: NDCN YAML Validation
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "."
          # On autorise les lignes longues pour les secrets chiffrés
          config_data: |
            extends: default
            rules:
              line-length: disable

      - name: Kubeconform (Schema Validation)
        # On utilise l'action officielle de kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          entrypoint: "/kubeconform"
          args: "-summary -ignore-filename-pattern .yaml -ignore-custom-resources ."